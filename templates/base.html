<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notre-Dame de la Sainte-Croix de Saignes-en-Padaine — {% block title %}{{ t.title_suffix }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="hdr-left">
    <img src="/static/logo.svg" alt="Notre-Dame de la Sainte-Croix de Saignes-en-Padaine" class="hdr-logo">
    <span id="subtitle">{{ t.subtitle }}</span>
  </div>
  <nav class="page-nav">
    <a href="/"{% if active_page == "weather" %} class="active"{% endif %}>{{ t.nav_weather }}</a>
    <a href="/irrigation"{% if active_page == "irrigation" %} class="active"{% endif %}>{{ t.nav_irrigation }}</a>
  </nav>
  <div class="hdr-right">
    <span id="demo-badge" class="badge hidden">DEMO</span>
    <button id="refresh-btn" class="icon-btn" type="button" aria-label="{{ t.refresh_title }}" title="{{ t.refresh_title }}">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="currentColor" d="M24 17.48a2.5 2.5 0 0 1-2.5 2.5L15 20c-1.66 0-3-1.34-3-3c0-1.6 1.26-2.9 2.84-2.98A3.5 3.5 0 0 1 18 12c1.76 0 3.2 1.3 3.45 2.99c.02 0 .03-.01.05-.01a2.5 2.5 0 0 1 2.5 2.5M10 15c0-.55-.45-1-1-1s-1 .45-1 1v1.44c-1.22-1.1-2-2.67-2-4.44c0-2.38 1.39-4.43 3.4-5.4c.37-.18.6-.56.6-.97c0-.71-.73-1.18-1.37-.88C5.89 6.03 4 8.79 4 12c0 2.4 1.06 4.54 2.73 6H5c-.55 0-1 .45-1 1s.45 1 1 1h4c.55 0 1-.45 1-1zm9-9c.55 0 1-.45 1-1s-.45-1-1-1h-4c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1s1-.45 1-1V7.56c.98.89 1.68 2.08 1.92 3.44h2.02a7.98 7.98 0 0 0-2.66-5z" />
      </svg>
    </button>
    <button id="config-btn" class="icon-btn" type="button" aria-label="{{ t.config_title }}" title="{{ t.config_title }}">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6s3.6 1.62 3.6 3.6s-1.62 3.6-3.6 3.6" />
      </svg>
    </button>
  </div>
</header>

<div id="config-overlay" class="config-overlay hidden">
  <div class="config-panel">
    <div class="config-panel-header">
      <span class="card-label">{{ t.config_title }}</span>
      <button id="config-close" class="icon-btn" type="button" aria-label="{{ t.close }}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M5 5l14 14M19 5L5 19"/>
        </svg>
      </button>
    </div>
    <div class="config-body">
      <label class="config-field">
        <span class="config-field-label">{{ t.field_lang }}</span>
        <select id="cfg-lang">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="it">Italiano</option>
        </select>
      </label>
      <label class="config-field">
        <span class="config-field-label">{{ t.field_station }}</span>
        <input type="text" id="cfg-station" maxlength="4" pattern="[A-Za-z]{4}" placeholder="ZSNJ" autocapitalize="characters" autocomplete="off" spellcheck="false">
        <span class="config-field-hint">{{ t.field_station_hint }}</span>
      </label>
      <label class="config-field">
        <span class="config-field-label">{{ t.field_broker }}</span>
        <input type="text" id="cfg-broker">
      </label>
      <label class="config-field">
        <span class="config-field-label">{{ t.field_topic }}</span>
        <input type="text" id="cfg-topic">
      </label>
    </div>
    <div class="config-actions">
      <button id="config-cancel" class="btn btn-outline" type="button">{{ t.btn_cancel }}</button>
      <button id="config-save" class="btn btn-solid" type="button">{{ t.btn_save }}</button>
    </div>
  </div>
</div>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <img src="/static/logo.svg" alt="Notre-Dame de la Sainte-Croix de Saignes-en-Padaine" class="footer-logo">
</footer>

<script>window.I18N = {{ i18n_json|safe }};</script>
<script src="/static/app.js"></script>
{% block page_script %}{% endblock %}
</body>
</html>
